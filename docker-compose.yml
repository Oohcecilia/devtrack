services:
  couchdb:
    image: couchdb:3
    container_name: devtrack-couchdb
    restart: unless-stopped
    ports:
      - "5984:5984"
    environment:
      COUCHDB_USER: ${COUCHDB_USERNAME:-admin}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-password}
    volumes:
      - couchdb_data:/opt/couchdb/data

volumes:
  couchdb_data:
